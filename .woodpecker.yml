when:
  - event: push
    branch: main

steps:
  deploy:
    image: docker:27-cli
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/freedeeml/ci:/opt/ci:ro
    environment:
      VITE_API_BASE_URL: https://utils.alexeyav.ru/api
      VITE_GRAFANA_URL: https://utils.alexeyav.ru/grafana
      VITE_TEMPORAL_URL: https://temporal.alexeyav.ru
    commands:
      - apk add --no-cache bash git
      - export WORKSPACE=$${CI_WORKSPACE}
      - bash /opt/ci/deploy-my-utils.sh
